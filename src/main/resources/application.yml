# ============================================================
# API Gateway - Production Configuration (Render + CORS)
# ============================================================

server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: prod

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

      # ======================================================
      # CORS GLOBAL
      # ======================================================
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "https://intranet-frontend-seven.vercel.app"
              - "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # ======================================================
      # 🔹 Rutas manuales
      # ======================================================
      routes:

        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/login

        - id: auth-validate
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/validate

        - id: auth-health
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/health

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

# ======================================================
# Eureka Client
# ======================================================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ======================================================
# Actuator
# ======================================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, routes

# ======================================================
# Logging
# ======================================================
logging:
  level:
    org.springframework.cloud.gateway: INFO
    root: INFO

# ======================================================
# JWT
# ======================================================
security:
  jwt:
    key:
      private: ${JWT_PRIVATE_KEY}
