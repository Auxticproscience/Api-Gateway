# ============================================================
# API Gateway - Production Configuration (CORS FIXED)
# ============================================================

server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: prod

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://intranet-frontend-seven.vercel.app"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # ======================================================
      # Routes
      # ======================================================
      routes:

        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/login
            - Method=POST

        - id: auth-validate
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/validate
            - Method=POST

        - id: auth-health
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/health
            - Method=GET

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

# Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, routes

logging:
  level:
    org.springframework.cloud.gateway: INFO
    root: INFO

security:
  jwt:
    key:
      private: ${JWT_PRIVATE_KEY}
