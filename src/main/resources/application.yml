server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  webflux:
    cors:
      enabled: true

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "https://intranet-frontend-seven.vercel.app"
              - "http://localhost:4200"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      routes:

        - id: auth-service-login
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/login
          filters:
            - PreserveHostHeader

        - id: auth-service-validate
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/validate
          filters:
            - PreserveHostHeader

        - id: auth-health
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/health

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - PreserveHostHeader

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, routes

logging:
  level:
    org.springframework.cloud.gateway: INFO
    root: INFO

security:
  jwt:
    key:
      private: ${JWT_PRIVATE_KEY}
