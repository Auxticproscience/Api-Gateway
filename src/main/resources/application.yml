# ============================================================
# API Gateway - Production Configuration
# ============================================================

# Server Configuration
server:
  port: 8080

# Application Config
spring:
  application:
    name: api-gateway
  profiles:
    active: prod

  # Gateway Configuration
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Global filters
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:
        # Auth Service Routes
        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/login
            - Method=POST

        - id: auth-validate
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/validate
            - Method=POST

        - id: auth-health
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/health
            - Method=GET

        # User Service Routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

      # Global CORS
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            exposedHeaders:
              - Authorization
            maxAge: 3600

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, routes
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging para DEBUG
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
    reactor.netty: INFO
    root: INFO

# JWT Key from environment
security:
  jwt:
    key:
      private: ${JWT_PRIVATE_KEY}