# ============================================================
# API Gateway - Production Configuration
# ============================================================

# Server Configuration
server:
  port: 8080

# Application Config
spring:
  application:
    name: api-gateway
  profiles:
    active: prod

  # Gateway Configuration
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # Gateway Health
        - id: gateway-simple-health
          uri: http://localhost:8080
          predicates:
            - Path=/api/health
            - Method=GET
          filters:
            - RewritePath=/api/health, /actuator/health

        # Auth Service Routes
        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/login
            - Method=POST

        - id: auth-validate
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/validate
            - Method=POST

        - id: auth-health
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/health
            - Method=GET

        # User Service Routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    instance-id: ${spring.application.name}:${server.port}
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, routes
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.cors: DEBUG
    org.springframework.http.server.reactive: DEBUG
    com.netflix.eureka: INFO
    reactor.netty: INFO
    root: INFO

# JWT Key
security:
  jwt:
    key:
      private: ${JWT_PRIVATE_KEY}