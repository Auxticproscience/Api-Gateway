server:
  port: 8080

spring:
  application:
    name: api-gateway

  webflux:
    cors:
      enabled: false

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - ${FRONTEND_URL}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: user-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - PreserveHostHeader

        - id: user-users
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - PreserveHostHeader

        - id: academy-service
          uri: lb://academy-service
          predicates:
            - Path=/api/academy/**
          filters:
            - PreserveHostHeader

        - id: requirement-service
          uri: lb://requirement-service
          predicates:
            - Path=/api/requirements/**
          filters:
            - PreserveHostHeader

        - id: fallback
          uri: no://op
          predicates:
            - Path=/**
          filters:
            - SetStatus=404

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:/eureka/}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

security:
  jwt:
    key:
      private: ${JWT_PRIVATE_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, routes
