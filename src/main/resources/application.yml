# ============================================================
# API Gateway - Plan B con CORS en cada ruta
# ============================================================

server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: prod

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

      routes:
        # Gateway Health
        - id: gateway-health
          uri: http://localhost:8080
          predicates:
            - Path=/api/health
          filters:
            - RewritePath=/api/health, /actuator/health
            - AddResponseHeader=Access-Control-Allow-Origin, https://intranet-frontend-seven.vercel.app
            - AddResponseHeader=Access-Control-Allow-Credentials, true
            - AddResponseHeader=Access-Control-Allow-Methods, GET, POST, PUT, DELETE, OPTIONS
            - AddResponseHeader=Access-Control-Allow-Headers, *

        # Auth Login - CON CORS HEADERS
        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/login
          filters:
            - AddResponseHeader=Access-Control-Allow-Origin, https://intranet-frontend-seven.vercel.app
            - AddResponseHeader=Access-Control-Allow-Credentials, true
            - AddResponseHeader=Access-Control-Allow-Methods, GET, POST, PUT, DELETE, OPTIONS
            - AddResponseHeader=Access-Control-Allow-Headers, *
            - AddResponseHeader=Access-Control-Max-Age, 3600

        - id: auth-validate
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/validate
          filters:
            - AddResponseHeader=Access-Control-Allow-Origin, https://intranet-frontend-seven.vercel.app
            - AddResponseHeader=Access-Control-Allow-Credentials, true

        - id: auth-health
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/health
          filters:
            - AddResponseHeader=Access-Control-Allow-Origin, https://intranet-frontend-seven.vercel.app
            - AddResponseHeader=Access-Control-Allow-Credentials, true

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - AddResponseHeader=Access-Control-Allow-Origin, https://intranet-frontend-seven.vercel.app
            - AddResponseHeader=Access-Control-Allow-Credentials, true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, routes

logging:
  level:
    org.springframework.cloud.gateway: INFO
    root: INFO

security:
  jwt:
    key:
      private: ${JWT_PRIVATE_KEY}